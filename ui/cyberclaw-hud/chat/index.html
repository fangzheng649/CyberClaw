<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberClaw — CyberAgent 对话</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- Bootstrap + AdminLTE dark theme overrides -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3/dist/css/adminlte.min.css" />
    <!-- DataTables Bootstrap4 -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap4.min.css" />
    <!-- CyberClaw dark theme overrides (MUST load after AdminLTE) -->
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../src/dashboard.css" />
  </head>
  <body>
    <div id="app">
      <!-- Top Navigation -->
      <header class="topbar">
        <div class="topbar-brand">
          <span class="brand">CYBER<span class="brand-accent">CLAW</span></span>
          <span class="brand-sub">CyberAgent</span>
        </div>
        <nav class="tabs">
          <button class="tab active" data-tab="chat">对话</button>
          <button class="tab" data-tab="dashboard">Dashboard</button>
          <button class="tab" data-tab="reports">报告</button>
          <button class="tab" data-tab="ops">操作</button>
          <button class="tab" data-tab="history">历史</button>
        </nav>
        <button class="hud-link" id="btn-open-hud" title="打开 3D 安全 HUD">
          <span class="hud-link-icon">⬡</span> 3D HUD
        </button>
      </header>

      <!-- Tab: Chat -->
      <main class="tab-content active" id="tab-chat">
        <div class="chat-messages" id="chat-messages">
          <div class="chat-welcome">
            <div class="welcome-icon">⬡</div>
            <h2>CyberAgent 就绪</h2>
            <p>IoT 安全智能助手已上线。你可以用自然语言提问或下达安全指令。</p>
            <div class="quick-actions">
              <button class="quick-btn" data-prompt="帮我检查网络中所有 IoT 设备的安全状态">扫描网络安全状态</button>
              <button class="quick-btn" data-prompt="分析当前有哪些安全漏洞">分析安全漏洞</button>
              <button class="quick-btn" data-prompt="生成今天的安全巡检报告">生成巡检报告</button>
              <button class="quick-btn" data-prompt="回放最近的攻击过程">攻击复盘</button>
            </div>
          </div>
        </div>
      </main>

      <!-- Tab: Dashboard -->
      <main class="tab-content" id="tab-dashboard">
        <div id="dashboard-content"></div>
      </main>

      <!-- Tab: Reports -->
      <main class="tab-content" id="tab-reports">
        <div class="rp-layout">
          <div class="rp-toolbar">
            <div class="rp-tabs">
              <button class="rp-tab active" data-rp="devices">设备清单</button>
              <button class="rp-tab" data-rp="events">安全事件</button>
            </div>
            <div class="rp-controls" id="rp-controls"></div>
          </div>
          <div class="rp-body" id="rp-body">
            <div class="empty-state">加载数据中...</div>
          </div>
        </div>
        <div id="report-list" class="report-list-container"></div>
      </main>

      <!-- Tab: Operations -->
      <main class="tab-content" id="tab-ops">
        <div class="ops-layout">
          <div class="ops-left">
            <section class="ops-section">
              <h3>快捷操作</h3>
              <div class="ops-grid">
                <button class="ops-btn scan" data-prompt="扫描网络中的所有设备">
                  <span class="ops-icon">📡</span>全网扫描
                </button>
                <button class="ops-btn vuln" data-prompt="分析网络漏洞">
                  <span class="ops-icon">🔍</span>漏洞检测
                </button>
                <button class="ops-btn isolate" data-prompt="查看需要隔离的设备">
                  <span class="ops-icon">🛡️</span>设备隔离
                </button>
                <button class="ops-btn report" data-prompt="生成安全报告">
                  <span class="ops-icon">📊</span>生成报告
                </button>
              </div>
            </section>
            <section class="ops-section">
              <h3>扫描调度</h3>
              <div class="scan-scheduler">
                <div class="scan-fields">
                  <div class="scan-field">
                    <label>子网</label>
                    <input type="text" class="ops-input" id="scan-subnet" value="192.168.1.0/24" />
                  </div>
                  <div class="scan-field">
                    <label>间隔(s)</label>
                    <input type="number" class="ops-input" id="scan-interval" value="300" min="60" />
                  </div>
                </div>
                <div class="scan-actions">
                  <button class="ops-action-btn start" id="btn-scan-start">START</button>
                  <button class="ops-action-btn stop" id="btn-scan-stop" disabled>STOP</button>
                  <span class="scan-status-dot" id="scan-dot"></span>
                  <span class="scan-status-text" id="scan-status-text">已停止</span>
                </div>
                <div class="scan-stats" id="scan-stats"></div>
              </div>
            </section>
            <section class="ops-section">
              <h3>MCP 服务器</h3>
              <div class="mcp-list" id="mcp-list">
                <!-- Populated by JS -->
              </div>
            </section>
          </div>
          <div class="ops-right">
            <section class="ops-section">
              <h3>可用 Skills</h3>
              <div class="skills-list" id="skills-list">
                <!-- Populated by JS -->
              </div>
            </section>
            <section class="ops-section">
              <h3>活跃工作流</h3>
              <button class="ops-action-btn start" id="btn-add-wf" style="margin-bottom:8px;width:100%">+ New Workflow</button>
              <div class="wf-list" id="wf-list">
                <div class="empty-state">加载中...</div>
              </div>
            </section>
            <section class="ops-section flex-1">
              <h3>操作历史</h3>
              <div class="op-history" id="op-history">
                <div class="empty-state">暂无操作记录</div>
              </div>
            </section>
          </div>
        </div>
      </main>

      <!-- Tab: History -->
      <main class="tab-content" id="tab-history">
        <div class="hist-layout">
          <div class="hist-sidebar">
            <section class="hist-section">
              <h3>通知通道</h3>
              <div class="notif-channels" id="notif-channels">
                <div class="empty-state">加载中...</div>
              </div>
            </section>
            <section class="hist-section flex-1">
              <h3>工作流事件</h3>
              <div class="wf-evt-list" id="wf-evt-list">
                <div class="empty-state">加载中...</div>
              </div>
            </section>
          </div>
          <div class="hist-main">
            <div class="hist-main-header">
              <h3>通知历史</h3>
              <button class="ops-action-btn start hist-test-btn" id="btn-notif-test">发送测试</button>
            </div>
            <div class="notif-history" id="notif-history">
              <div class="empty-state">加载中...</div>
            </div>
          </div>
        </div>
      </main>

      <!-- Fixed Input Bar -->
      <footer class="input-bar">
        <div class="input-wrapper">
          <input type="text" id="chat-input" class="chat-input" placeholder="输入安全问题或指令..." autocomplete="off" />
          <button id="btn-send" class="btn-send">发送</button>
        </div>
      </footer>

      <!-- Device Detail Slide Panel -->
      <div class="device-panel" id="device-panel">
        <div class="dpn-header">
          <button class="dpn-close" id="dpn-close">&times;</button>
          <div class="dpn-device-name" id="dpn-name"></div>
          <span class="status-badge" id="dpn-status-badge"></span>
        </div>
        <div class="dpn-nav">
          <button class="dpn-tab active" data-dpn="overview">概览</button>
          <button class="dpn-tab" data-dpn="events">事件</button>
          <button class="dpn-tab" data-dpn="connections">连接</button>
        </div>
        <div class="dpn-body" id="dpn-body"></div>
        <div class="dpn-footer">
          <button class="dpn-prev" id="dpn-prev">&lsaquo; Prev</button>
          <span id="dpn-position" style="font-size:10px;color:var(--muted)"></span>
          <button class="dpn-next" id="dpn-next">Next &rsaquo;</button>
        </div>
      </div>
    </div>

    <!-- jQuery + Bootstrap + AdminLTE -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3/dist/js/adminlte.min.js"></script>
    <!-- DataTables -->
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap4.min.js"></script>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>
    <script src="main.js" type="module"></script>
  </body>
</html>
